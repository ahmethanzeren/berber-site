<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Zeren Güzellik Salonu</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #fff0f5, #ffe4e1);
    color: #333;
}

/* NAVBAR */
nav {
    display: flex;
    justify-content: center;
    gap: 30px;
    padding: 15px;
    background: white;
    position: fixed;
    width: 100%;
    top: 0;
    box-shadow: 0px 2px 10px rgba(0,0,0,0.1);
}

nav a {
    color: #333;
    text-decoration: none;
    font-weight: 600;
}

nav a:hover {
    color: #e91e63;
}

/* ANA ALAN */
.kutu {
    margin-top: 120px;
    text-align: center;
    padding: 20px;
}

/* KART */
.card {
    background: white;
    padding: 30px;
    border-radius: 20px;
    width: 350px;
    margin: auto;
    box-shadow: 0px 10px 30px rgba(0,0,0,0.1);
}

/* BAŞLIK */
h1 {
    font-family: 'Playfair Display', serif;
    color: #e91e63;
    margin-bottom: 10px;
}

/* ALT BAŞLIK */
h3 {
    margin-top: 20px;
    color: #555;
}

/* BUTON */
.btn {
    display: inline-block;
    margin-top: 15px;
    padding: 12px 25px;
    background: linear-gradient(45deg, #e91e63, #ff4081);
    color: white;
    border-radius: 30px;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
}

/* WHATSAPP */
.wp {
    background: #25D366;
}

.wp:hover {
    background: #1ebe5d;
}

/* MOBİL */
@media (max-width: 600px) {
    .card {
        width: 90%;
    }
}
</style>

</head>
<body>

<nav>
    <a href="#">Ana Sayfa</a>
    <a href="#">Hizmetler</a>
    <a href="#">İletişim</a>
</nav>

<div class="kutu">

        <h1>Zeren Güzellik Salonu</h1>

        <h3>Hizmetlerimiz</h3>
        <p>Saç Tasarım</p>

        <p>Profesyonel Makyaj</p>

        <h3>İletişim</h3>

        <p>📍 Doğubeyazıt</p>

        <a href="tel:05454171836" class="btn">📞 Hemen Ara</a>

        <a href="https://wa.me/905454171836" class="btn wp">
            WhatsApp’tan Randevu Al
        </a>
    </div>
</div>

</body>
</html>
